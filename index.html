<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elson's Super Chess Game | Premium Chess</title>
  <meta name="description" content="A premium web-based chess experience.">
  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1b4b">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Chess">
  <link rel="apple-touch-icon" href="icons/icon.jpg">
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <!-- Use chess.js for game logic -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
</head>
<body>
  <div class="app-background"></div>
  <div class="app-container">
    <div class="glass-panel">
      <header>
        <div class="logo">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19h16"/><path d="M12 19v-4"/><path d="M8 15h8"/><path d="M12 15V9"/><path d="M10 9h4"/><path d="M12 9V5"/><path d="M10 5h4"/><path d="M12 5V3"/><path d="M9 3h6"/></svg>
          <h1>Elson's Super Chess Game</h1>
        </div>
        <div class="turn-indicator" id="turn-indicator">
          <span class="dot white-dot" id="turn-dot"></span> <span id="turn-text">White's Turn</span>
        </div>
      </header>
      
      <main class="game-area">
        <div class="board-container">
          <div id="chessboard" class="chessboard"></div>
          <div id="board-rotate-overlay" class="board-rotate-overlay hidden">
            <button id="board-rotate-left" class="rotate-btn" title="Rotate Left">↺</button>
            <button id="board-rotate-right" class="rotate-btn" title="Rotate Right">↻</button>
          </div>
        </div>
        
        <aside class="sidebar">
          <div class="score-box">
            <h3>Match Score</h3>
            <div class="score-display">
              <div class="score-item">
                <span class="score-label">White</span>
                <span id="score-white" class="score-value">0</span>
              </div>
              <div class="score-divider">-</div>
              <div class="score-item">
                <span class="score-label">Black</span>
                <span id="score-black" class="score-value">0</span>
              </div>
            </div>
            <button id="reset-score-btn" class="btn text-btn">Reset Score</button>
          </div>
          
          <div class="clock-box">
            <h3>Chess Clock</h3>
            <div class="clock-display" style="display: flex; justify-content: space-between; align-items: center; background: rgba(0, 0, 0, 0.2); padding: 10px 15px; border-radius: 12px; margin-bottom: 15px;">
              <div class="clock-item" id="clock-white-container" style="text-align: center; padding: 5px 10px; border-radius: 8px;">
                <span class="clock-label" style="font-size: 0.8em; color: var(--text-muted); display: block; margin-bottom: 4px;">White</span>
                <span id="clock-white" class="clock-value" style="font-size: 1.5em; font-weight: 700; font-variant-numeric: tabular-nums;">--:--</span>
              </div>
              <div class="clock-item" id="clock-black-container" style="text-align: center; padding: 5px 10px; border-radius: 8px;">
                <span class="clock-label" style="font-size: 0.8em; color: var(--text-muted); display: block; margin-bottom: 4px;">Black</span>
                <span id="clock-black" class="clock-value" style="font-size: 1.5em; font-weight: 700; font-variant-numeric: tabular-nums;">--:--</span>
              </div>
            </div>
          </div>
          
          <div class="status-box">
            <h3>Game Status</h3>
            <p id="game-status" class="status-text">In Progress</p>
          </div>
          
          <div class="history-box">
            <h3>Move History</h3>
            <div class="history-headers">
              <span>#</span>
              <span>White</span>
              <span>Black</span>
            </div>
            <div id="move-history" class="move-history"></div>
          </div>
          
          <div class="mode-box">
            <h3>Game Mode</h3>
            <select id="game-mode" class="mode-select">
              <option value="pvp">Player vs Player</option>
              <option value="pvc" selected>Player vs Computer</option>
              <option value="laser-pvp">Laser Chess 🔫</option>
            </select>
            
            <div id="player-color-container" style="margin-top: 10px; margin-bottom: 10px;">
              <label style="font-size: 0.9em; margin-bottom: 5px; display: block; color: var(--text-muted);">Play as:</label>
              <select id="player-color" class="mode-select">
                <option value="w" selected>White</option>
                <option value="b">Black</option>
              </select>
            </div>
            
            <div style="margin-top: 10px; margin-bottom: 10px;">
              <label style="font-size: 0.9em; margin-bottom: 5px; display: block; color: var(--text-muted);">Time Control:</label>
              <select id="time-control" class="mode-select">
                <option value="0" selected>Disabled</option>
                <option value="60">1 min</option>
                <option value="180">3 min</option>
                <option value="300">5 min</option>
                <option value="600">10 min</option>
              </select>
            </div>
            
            <div class="toggle-container">
              <label class="switch">
                <input type="radio" name="chess-variant" id="standard-mode-toggle" checked>
                <span class="slider round"></span>
              </label>
              <span class="standard-label">Standard Chess ♟️</span>
            </div>
            
            <div class="toggle-container">
              <label class="switch">
                <input type="radio" name="chess-variant" id="bomb-mode-toggle">
                <span class="slider round"></span>
              </label>
              <span class="bomb-label">Bomb Mode 💣</span>
            </div>
            
            <div class="toggle-container">
              <label class="switch">
                <input type="radio" name="chess-variant" id="snowball-mode-toggle">
                <span class="slider round snowball-slider"></span>
              </label>
              <span class="snowball-label">Snowball Mode ⛄</span>
            </div>
          </div>
          
          <div class="controls">
            <button id="reset-btn" class="btn primary-btn">New Game</button>
            <button id="undo-btn" class="btn secondary-btn">Undo Move</button>
            <div id="rotate-controls" class="rotate-controls hidden">
              <button id="rotate-left-btn" class="btn secondary-btn">Rotate Left ↺</button>
              <button id="rotate-right-btn" class="btn secondary-btn">Rotate Right ↻</button>
            </div>
          </div>
        </aside>
      </main>
    </div>

    <div id="game-over-modal" class="modal hidden">
      <div class="modal-glass">
        <h2 id="modal-title">Checkmate!</h2>
        <p id="modal-message">White wins the game.</p>
        <button id="modal-reset-btn" class="btn primary-btn">Play Again</button>
      </div>
    </div>
  </div>
  <script defer src="/_vercel/insights/script.js"></script>
  <script src="laser.js"></script>
  <script src="script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
